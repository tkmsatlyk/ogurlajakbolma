name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch and Decode Links
        run: |
          touch raw_base64.txt raw_links.txt
          
          # Kaynaklardan verileri çek
          curl -s "https://raw.githubusercontent.com/freefq/free/master/v2" >> raw_base64.txt || true
          curl -s "https://raw.githubusercontent.com/vfarid/v2ray-share/main/all_links.txt" >> raw_base64.txt || true
          curl -s "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_live_v2ray" >> raw_base64.txt || true
          
          # Satır satır oku ve her birini Base64 olarak çözmeye çalış
          while IFS= read -r line; do
            if [[ ! -z "$line" ]]; then
              echo "$line" | base64 -d >> raw_links.txt 2>/dev/null || echo "$line" >> raw_links.txt
            fi
          done < raw_base64.txt
          
          # Protokolleri filtrele ve temizle
          grep -E "(vless:\/\/|vmess:\/\/|trojan:\/\/|ss:\/\/)" raw_links.txt > filtered_links.txt || true
          sort -u filtered_links.txt > toplanan_linkler.txt
          
          # Geçici temizlik
          rm -f raw_base64.txt raw_links.txt filtered_links.txt

      - name: Commit and Push Clean Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          git commit -m "Bedava link listesi guncellendi [Base64 Cozuldu]" || true
          git push || true
