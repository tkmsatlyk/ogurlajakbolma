name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '*/30 * * * *' # Her 30 dakikada bir en taze düşenleri yakalar
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch and Header Injection
        run: |
          # 1. Aşama: Dosyayı sıfırla ve senin özel yazılarını EN BAŞA çak!
          cat << 'EOF' > toplanan_linkler.txt
#profile-title: ✍şatlyk🜲.com🗿
#profile-update-interval: 1
#support-url: 
#profile-web-page-url: 
#announce: ✍şatlyk🜲.com⚠️tarafından⚡️ yasalan getir🪪 bot 🚨
#subscription-userinfo: upload=0; download=0; total=0; expire=0
EOF

          touch temp_live.txt

          # Canlı proxy havuzları
          URLS=(
            "https://raw.githubusercontent.com/Zu6666/v2ray-share/main/all_links.txt"
            "https://raw.githubusercontent.com/yebekhe/TVC/main/v2ray/mix.txt"
            "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt"
            "https://raw.githubusercontent.com/awesome-vpn/vpn/master/v2ray"
          )

          for url in "${URLS[@]}"; do
            curl -sL --fail --max-time 15 "$url" > single_raw.txt || continue
            
            if [ -s single_raw.txt ] && ! grep -q "Not Found" single_raw.txt; then
              if cat single_raw.txt | base64 -d > single_decoded.txt 2>/dev/null; then
                cat single_decoded.txt >> temp_live.txt
              else
                cat single_raw.txt >> temp_live.txt
              fi
            fi
          done

          # Geçerli protokol satırlarını süz
          grep -iE "(vless|vmess|trojan|ss|ssr|hysteria|tuic):\/\/" temp_live.txt > filtered_proto.txt || true
          
          # Sadece 443 ve 80 portuna sahip olan linkleri ayıkla
          grep -E "(:443|:80)[^0-9]" filtered_proto.txt > filtered_ports.txt || true
          
          # Windows satır sonlarını temizle ve mükerrerleri silerek sırala
          sed -i 's/\r//g' filtered_ports.txt
          sort -u filtered_ports.txt > sorted_links.txt
          
          # 2. Aşama: Ayıklanan taze linkleri, o silinmez yazıların ALTINA ekle
          cat sorted_links.txt >> toplanan_linkler.txt
          
          # Geçici dosyaları temizle
          rm -f single_raw.txt single_decoded.txt temp_live.txt filtered_proto.txt filtered_ports.txt sorted_links.txt

      - name: Commit and Push VIP Links with Header
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          
          # Dosyada sadece senin yazdığın başlıklar değil, link de varsa push et
          if [ $(wc -l < toplanan_linkler.txt) -gt 7 ]; then
            git commit -m "Satlyk Özel Başlıklı Havuz Güncellendi: $(date +'%H:%M:%S')"
            git push
          fi
