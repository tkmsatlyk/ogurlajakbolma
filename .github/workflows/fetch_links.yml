name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '*/30 * * * *' # Her 30 dakikada bir en taze düşenleri yakalar
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Realtime Live Links
        run: |
          # Eski listeyi tamamen sıfırla, bayat tek bir satır kalmasın
          > toplanan_linkler.txt
          touch temp_live.txt

          # Telegram ve anlık havuzlardan saniyelik proxy çeken canlı API ve büyük scraper adresleri
          URLS=(
            "https://raw.githubusercontent.com/Zu6666/v2ray-share/main/all_links.txt"
            "https://raw.githubusercontent.com/yebekhe/TVC/main/v2ray/mix.txt"
            "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt"
            "https://raw.githubusercontent.com/awesome-vpn/vpn/master/v2ray"
          )

          for url in "${URLS[@]}"; do
            # Hatalı siteleri es geç, veriyi çek
            curl -sL --fail --max-time 15 "$url" > single_raw.txt || continue
            
            if [ -s single_raw.txt ] && ! grep -q "Not Found" single_raw.txt; then
              # Base64 korumalı kontrol ve decode işlemi
              if cat single_raw.txt | base64 -d > single_decoded.txt 2>/dev/null; then
                cat single_decoded.txt >> temp_live.txt
              else
                cat single_raw.txt >> temp_live.txt
              fi
            fi
          done

          # Sadece geçerli, canlı protokol formatlarını süz (404 veya çöp metinleri engeller)
          grep -iE "(vless|vmess|trojan|ss|ssr|hysteria|tuic):\/\/" temp_live.txt > filtered.txt || true
          
          # Windows satır sonlarını uçur ve mükerrerleri silerek temizle
          sed -i 's/\r//g' filtered.txt
          sort -u filtered.txt > toplanan_linkler.txt
          
          # Geçici dosyaları temizle
          rm -f single_raw.txt single_decoded.txt temp_live.txt filtered.txt

      - name: Commit and Push Realtime Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          
          # Eğer dosya başarıyla dolduysa anlık saatle push et
          if [ -s toplanan_linkler.txt ]; then
            git commit -m "Saniyelik taze havuz yuklendi: $(date +'%H:%M:%S')"
            git push
          fi
