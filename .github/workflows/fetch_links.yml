name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Collector Engine
        run: |
          python collector.py

      - name: Commit and Force Push VIP Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          
          # Dosyayı kesin olarak Git takibine ekle
          git add toplanan_linkler.txt
          
          # Saat ve tarih mühürlü yeni bir commit mesajı oluştur (Her saniye değişeceği için Git farkı zorunlu hissedecek)
          git commit -m "VIP Havuzu Zorunlu Yenilendi: $(date +'%d-%m-%Y %H:%M:%S')"
          
          # Değişikliği ana sunucuya zorla gönder
          git push origin main
