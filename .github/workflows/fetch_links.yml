name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Collector Engine
        run: |
          python collector.py

      - name: Commit and Push VIP Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          
          if [ $(wc -l < toplanan_linkler.txt) -gt 6 ]; then
            git commit -m "Vordr Motoru Genis Portlarla Calistirildi: $(date +'%H:%M:%S')"
            git push
          fi
