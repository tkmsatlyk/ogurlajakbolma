name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Links from Public Sources
        run: |
          touch raw_links.txt
          
          # Daha aktif ve yuksek kapasiteli acik kaynak havuzlar
          curl -s "https://raw.githubusercontent.com/freefq/free/master/v2" >> raw_links.txt || true
          curl -s "https://raw.githubusercontent.com/vfarid/v2ray-share/main/all_links.txt" >> raw_links.txt || true
          curl -s "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_live_v2ray" >> raw_links.txt || true
          curl -s "https://raw.githubusercontent.com/tubaoshu/sub/main/v2ray" >> raw_links.txt || true
          
          # Base64 cozme ihtiyaci olabilecek kaynaklar icin filtreyi genisletiyoruz
          grep -E "^(vless:\/\/|vmess:\/\/|trojan:\/\/|ss:\/\/)" raw_links.txt > filtered_links.txt || true
          sort -u filtered_links.txt > toplanan_linkler.txt
          rm -f raw_links.txt filtered_links.txt

      - name: Commit and Push Clean Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          git commit -m "Bedava link listesi guncellendi [Formatlar temizlendi]" || true
          git push || true
