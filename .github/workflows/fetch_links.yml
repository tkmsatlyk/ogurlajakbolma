name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '*/30 * * * *' # Her 30 dakikada bir otomatik çalışır, taze olanı kapar!
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Just Delivered Links
        run: |
          # Geçmişten kalan her şeyi tamamen sıfırla, bayat veri kalmasın
          > toplanan_linkler.txt
          touch temp_raw.txt

          # Anlık, saniyelik düşen taze link havuzları (Özel Scraper API'leri)
          URLS=(
            "https://raw.githubusercontent.com/Zu6666/v2ray-share/main/all_links.txt"
            "https://raw.githubusercontent.com/shif6/v2ray-free/master/v2ray"
            "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_live_v2ray"
            "https://raw.githubusercontent.com/freefq/free/master/v2"
          )

          for url in "${URLS[@]}"; do
            curl -s --max-time 15 "$url" > single_raw.txt
            
            # İçerik şifreli Base64 ise çöz, düz metinse aynen aktar
            if cat single_raw.txt | base64 -d > single_decoded.txt 2>/dev/null; then
              cat single_decoded.txt >> temp_raw.txt
            else
              cat single_raw.txt >> temp_raw.txt
            fi
          done

          # Satırın neresinde olursa olsun vless, vmess, trojan, ss, hysteria, tuic içerenleri süz
          grep -iE "(vless|vmess|trojan|ss|ssr|hysteria|tuic):\/\/" temp_raw.txt > filtered.txt || true
          
          # Windows satır sonlarını temizle ve aynı olanları silerek sırala
          sed -i 's/\r//g' filtered.txt
          sort -u filtered.txt > toplanan_linkler.txt
          
          # Geçici dosyaları uçur
          rm -f single_raw.txt single_decoded.txt temp_raw.txt filtered.txt

      - name: Commit and Push Taptaze Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          
          # Sadece dosya gerçekten doluysa anlık saatle commit et
          if [ -s toplanan_linkler.txt ]; then
            git commit -m "Az once teslim edilenler yuklendi: $(date +'%H:%M:%S')"
            git push
          fi
