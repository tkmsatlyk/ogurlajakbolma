name: Fetch and Clean Free VPN Link
on:
  schedule:
    - cron: '*/30 * * * *' # HER 30 DAKİKADA BİR otomatik çalışır ve taze linkleri yakalar!
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Anlik Taze Links
        run: |
          # Eski bayat linkleri tamamen uçuruyoruz
          > toplanan_linkler.txt
          touch temp_raw.txt

          # Dakikalık ve anlık güncellenen, en taze proxy scrapers (kazıyıcılar)
          URLS=(
            "https://raw.githubusercontent.com/Zu6666/v2ray-share/main/all_links.txt"
            "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_live_v2ray"
            "https://raw.githubusercontent.com/freefq/free/master/v2"
            "https://raw.githubusercontent.com/shif6/v2ray-free/master/v2ray"
          )

          for url in "${URLS[@]}"; do
            curl -s --max-time 10 "$url" > single_raw.txt
            # Eğer Base64 şifreliyse çöz, düz metinse aynen al
            cat single_raw.txt | base64 -d > single_decoded.txt 2>/dev/null || cat single_raw.txt > single_decoded.txt
            cat single_decoded.txt >> temp_raw.txt
          done

          # Sadece geçerli protokol satırlarını filtrele
          grep -iE "(vless|vmess|trojan|ss|ssr|hysteria|tuic):\/\/" temp_raw.txt > filtered.txt || true
          
          # Windows satır sonlarını (\r) temizle ve mükerrerleri silerek sırala
          sed -i 's/\r//g' filtered.txt
          sort -u filtered.txt > toplanan_linkler.txt
          
          # Temizlik
          rm -f single_raw.txt single_decoded.txt temp_raw.txt filtered.txt

      - name: Commit and Push Anlik Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          
          # Sadece dosya doluysa ve gerçekten yeni bir şeyler geldiyse dakikalık zaman damgasıyla yükle
          if [ -s toplanan_linkler.txt ]; then
            git commit -m "Anlik taptaze linkler yuklendi: $(date +'%H:%M:%S')"
            git push
          fi
