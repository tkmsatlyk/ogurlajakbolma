name: VORDR Avci Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Senin manuel olarak tetikleyebilmen için

permissions:
  contents: write # Botun dosyayı kaydetmesi için gereken izin!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Avci Botu Calistir
        run: python collector.py

      - name: Dosyayi Kaydet ve GitHub'a Yukle (PUSH)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add toplanan_linkler.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Yeni Ares Kodu Avlandı ve Eklendi!"
          git push
