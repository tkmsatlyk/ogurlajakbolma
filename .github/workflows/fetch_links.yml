name: Fetch and Clean Free VPN Links
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch and Smart Decode Links
        run: |
          touch all_combined.txt

          # Hem Base64 hem duz metin linkleri ayiklayan akilli fonksiyon
          download_and_extract() {
            local url=$1
            curl -s "$url" > raw.txt
            cat raw.txt | base64 -d > decoded.txt 2>/dev/null || true
            
            if grep -qE "(vless:\/\/|vmess:\/\/|trojan:\/\/|ss:\/\/)" decoded.txt; then
              cat decoded.txt >> all_combined.txt
            elif grep -qE "(vless:\/\/|vmess:\/\/|trojan:\/\/|ss:\/\/)" raw.txt; then
              cat raw.txt >> all_combined.txt
            fi
            rm -f raw.txt decoded.txt
          }

          # Kaynak havuzlarini sirayla tara
          download_and_extract "https://raw.githubusercontent.com/freefq/free/master/v2"
          download_and_extract "https://raw.githubusercontent.com/vfarid/v2ray-share/main/all_links.txt"
          download_and_extract "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_live_v2ray"
          download_and_extract "https://raw.githubusercontent.com/tubaoshu/sub/main/v2ray"

          # Protokolleri suz, Windows satir sonlarini (\r) temizle ve sirala
          grep -E "(vless:\/\/|vmess:\/\/|trojan:\/\/|ss:\/\/)" all_combined.txt > filtered.txt || true
          sed -i 's/\r//g' filtered.txt
          sort -u filtered.txt > toplanan_linkler.txt
          
          rm -f all_combined.txt filtered.txt

      - name: Commit and Push Clean Links
        run: |
          git config --global user.name "VordrBot"
          git config --global user.email "bot@vordr.com"
          git add toplanan_linkler.txt
          git commit -m "Bedava link listesi guncellendi [Akilli Decode]" || true
          git push || true
