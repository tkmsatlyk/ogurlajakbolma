name: Update Sub Usage
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update sub file
        run: |
          python3 -c "
          import re
          
          # Eklenecek miktar (6.38 MB'ın byte karşılığı)
          bytes_to_add = 5937792
          
          # Dosyayı oku
          with open('sub', 'r') as f:
              data = f.read()
          
          # Mevcut download değerini bul ve güncelle
          def replacer(match):
              current_val = float(match.group(1))
              new_val = int(current_val + bytes_to_add)
              return f'download={new_val}'
          
          # Dosyada sadece 'download=' satırını değiştir
          new_data = re.sub(r'download=([0-9.]+)', replacer, data)
          
          # Dosyayı kaydet
          with open('sub', 'w') as f:
              f.write(new_data)
          "
          
          # GitHub'a gönder
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sub
          git commit -m "Update download value"
          git push
