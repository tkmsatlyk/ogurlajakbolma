name: Update Sub Usage
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update only download value
        run: |
          # 1. Mevcut download değerini al
          current_dl=$(grep -oP 'download=\K[0-9.]+' sub)
          
          # 2. Yeni değeri hesapla (6.38 ekle)
          new_dl=$(echo "$current_dl + 6.38" | bc)
          
          # 3. Sadece download kısmını değiştir, dosyada başka hiçbir şeye dokunma
          sed -i "s/download=[0-9.]\+/download=$new_dl/" sub
          
          # 4. Değişiklikleri kaydet
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sub
          git commit -m "Update download: ${new_dl}MB"
          git push
